name: adar
description: "ADAR - A secure evidence reporting project using Flutter, Firestore, and Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter_dotenv: ^5.1.0
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.3.0
  image: ^4.1.3
  exif: ^3.3.0

  # Core Logic & Utilities
  shared_preferences: ^2.2.3
  intl: any # Updated for better compatibility
  permission_handler: ^11.3.1
  path_provider: ^2.1.2

  # Location & Maps
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Media Handling
  image_picker: ^1.1.2
  video_player: ^2.9.1
  video_compress: ^3.1.2

  # Database (Text Data)
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2

  # Storage (Photos & Videos)
  supabase_flutter: ^2.5.10

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.1

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  # Add your assets here if you have logos or images
  assets:
    - .env
    - assets/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21